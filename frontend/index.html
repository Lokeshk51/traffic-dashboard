<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Monitor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a1628;
      --bg-surface: #0f2040;
      --bg-card:    #152b52;
      --bg-hover:   #1a3460;
      --text-1:     #f1f5f9;
      --text-2:     #94a3b8;
      --text-3:     #475569;
      --border:     rgba(148,163,184,0.12);
      --green:      #22c55e;
      --yellow:     #eab308;
      --orange:     #f97316;
      --red:        #ef4444;
      --accent:     #3b82f6;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg-base);
      color: var(--text-1);
      height: 100vh;
      display: grid;
      grid-template-rows: 52px 1fr;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-1);
      white-space: nowrap;
    }

    .topbar .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    select, .ctrl-btn {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-1);
      cursor: pointer;
      outline: none;
      transition: background 0.15s;
    }
    select:hover, .ctrl-btn:hover { background: var(--bg-hover); }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }
    .badge.live    { background: rgba(34,197,94,0.15);  color: var(--green);  }
    .badge.paused  { background: rgba(234,179,8,0.15);  color: var(--yellow); }
    .badge.offline { background: rgba(239,68,68,0.15);  color: var(--red);    }

    .threshold-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-2);
      margin-left: auto;
    }

    input[type="range"] {
      width: 90px;
      accent-color: var(--orange);
      cursor: pointer;
    }

    /* ── Main layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      overflow: hidden;
    }

    /* ── Map ── */
    #map { width: 100%; height: 100%; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
    }

    .panel {
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    /* ── Metrics ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .metric .m-label {
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 4px;
    }

    .metric .m-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1;
    }

    /* ── Segment cards ── */
    .segment-card {
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      border-radius: 4px;
    }
    .segment-card:last-child { border-bottom: none; }
    .segment-card:hover { padding-left: 6px; }

    .segment-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-1);
      transition: color 0.2s;
    }

    .congestion-label {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 3px;
    }

    /* ── Alerts ── */
    .alerts-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }

    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .alert-item:hover { opacity: 0.8; }
    .alert-item.critical { background: rgba(239,68,68,0.12);  color: #fca5a5; }
    .alert-item.warn     { background: rgba(234,179,8,0.12);  color: #fde68a; }

    /* ── Chart ── */
    .chart-wrap {
      height: 120px;
      position: relative;
    }

    /* ── Status bar ── */
    #status {
      font-size: 11px;
      padding: 8px 16px;
      background: var(--bg-card);
      color: var(--text-3);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #status.status-ok      { color: var(--green);  }
    #status.status-error   { color: var(--red);    }
    #status.status-loading { color: var(--yellow); }

    /* ── City label on map ── */
    .city-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 10px;
    }

    /* ── Leaflet popup override ── */
    .leaflet-popup-content-wrapper {
      background: #1e3a5f;
      border: 1px solid rgba(148,163,184,0.2);
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .leaflet-popup-tip { background: #1e3a5f; }
    .leaflet-popup-content { margin: 14px 16px; color: #f1f5f9; }
    .leaflet-container a.leaflet-popup-close-button { color: #94a3b8; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── Topbar ── -->
  <div class="topbar">
    <h1>Traffic Monitor</h1>
    <div class="sep"></div>

    <select id="citySelect" onchange="changeCity(this.value)">
      <option value="blr">Bengaluru</option>
      <option value="mum">Mumbai</option>
      <option value="del">Delhi</option>
      <option value="hyd">Hyderabad</option>
    </select>

    <select onchange="filterRoads(this.value)">
      <option value="all">All roads</option>
      <option value="highway">Highways only</option>
      <option value="city">City roads only</option>
    </select>

    <button class="ctrl-btn" onclick="togglePause()" id="pauseBtn">Pause</button>

    <span class="badge live" id="liveBadge">● live</span>

    <div class="threshold-group">
      Alert at
      <input type="range" min="10" max="100" value="75" step="1"
        oninput="updateThreshold(this.value)" id="threshSlider">
      <strong id="threshVal">75</strong>%
    </div>
  </div>

  <!-- ── Main layout ── -->
  <div class="layout">

    <!-- Map -->
    <div id="map"></div>

    <!-- Sidebar -->
    <div class="sidebar">

      <!-- Metrics -->
      <div class="panel">
        <div class="panel-title">Overview</div>
        <div class="metrics-grid">
          <div class="metric">
            <div class="m-label">Avg congestion</div>
            <div class="m-value" id="metric-avg">--</div>
          </div>
          <div class="metric">
            <div class="m-label">Critical roads</div>
            <div class="m-value" id="metric-crit" style="color:var(--red)">--</div>
          </div>
          <div class="metric">
            <div class="m-label">Free flowing</div>
            <div class="m-value" id="metric-free" style="color:var(--green)">--</div>
          </div>
          <div class="metric">
            <div class="m-label">Updated</div>
            <div class="m-value" id="metric-time" style="font-size:13px">--:--</div>
          </div>
        </div>
      </div>

      <!-- Road segments -->
      <div class="panel">
        <div class="panel-title">Road segments — click to fly</div>
        <div id="segments"></div>
      </div>

      <!-- Alerts -->
      <div class="panel">
        <div class="panel-title">Active alerts</div>
        <div class="alerts-list" id="alertsList">
          <p style="font-size:12px;color:var(--text-3)">Loading...</p>
        </div>
      </div>

      <!-- Trend chart -->
      <div class="panel" style="flex:1">
        <div class="panel-title">Congestion trend</div>
        <div class="chart-wrap">
          <canvas id="trendChart"></canvas>
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="status-loading">Connecting to backend...</div>

    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
